kind = "web"
previewPath = "/"
title = "TradeSignal Pro"
version = "1.0.0"
id = "artifacts/tradesignal-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19288
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tradesignal-pro run dev"

[services.env]
PORT = "19288"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tradesignal-pro", "run", "build"]
publicDir = "artifacts/tradesignal-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
