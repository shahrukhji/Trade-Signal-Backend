packages:
  "lightweight-charts": "High performance financial charts for the mobile chart screen"
  "framer-motion": "Smooth UI animations and page transitions"
  "zustand": "Global state management for settings, paper trading, and preferences"
  "date-fns": "Date formatting for charts and signal history"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"

images:
  - path: "artifacts/tradesignal-pro/public/images/splash-logo.png"
