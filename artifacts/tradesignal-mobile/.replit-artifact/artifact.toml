kind = "mobile"
previewPath = "/tradesignal-mobile/"
title = "TradeSignal Pro Mobile"
version = "1.0.0"
id = "artifacts/tradesignal-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 25112
name = "expo"
paths = ["/tradesignal-mobile/"]

[services.development]
run = "pnpm --filter @workspace/tradesignal-mobile run dev"

[services.env]
PORT = "25112"
BASE_PATH = "/tradesignal-mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tradesignal-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/tradesignal-mobile", "run", "serve"]
